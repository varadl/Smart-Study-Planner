{% extends "base.html" %}
{% block title %}Login – Smart Study Planner{% endblock %}

{% block content %}
<section class="auth-section d-flex align-items-center justify-content-center py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-sm-10 col-md-8 col-lg-5">

        <div class="auth-card p-4 p-md-5">
          <!-- Header -->
          <div class="text-center mb-4">
            <div class="auth-icon-wrap mb-3">
              <i class="bi bi-box-arrow-in-right"></i>
            </div>
            <h2 class="fw-bold">Welcome Back</h2>
            <p class="text-muted small">Log in to your study dashboard</p>
          </div>

          <!-- Form -->
          <form action="{{ url_for('auth.login') }}" method="POST" id="loginForm" novalidate>

            <div class="mb-3">
              <label for="login_email" class="form-label fw-semibold">
                <i class="bi bi-envelope me-1 text-accent"></i>Email
              </label>
              <input type="email" id="login_email" name="email"
                     class="form-control ssp-input" placeholder="you@example.com"
                     required autocomplete="email" />
              <div class="invalid-feedback">Please enter your email.</div>
            </div>

            <div class="mb-4">
              <label for="login_password" class="form-label fw-semibold">
                <i class="bi bi-lock me-1 text-accent"></i>Password
              </label>
              <div class="input-group">
                <input type="password" id="login_password" name="password"
                       class="form-control ssp-input" placeholder="Enter your password"
                       required autocomplete="current-password" />
                <button class="btn btn-outline-secondary toggle-pw" type="button"
                        data-target="login_password" title="Show/Hide password">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
              <div class="invalid-feedback">Please enter your password.</div>
            </div>

            <button type="submit" class="btn btn-accent w-100 py-2 fw-semibold">
              <i class="bi bi-box-arrow-in-right me-2"></i>Log In
            </button>
          </form>

          <hr class="my-4" />
          <p class="text-center text-muted small mb-0">
            Don't have an account?
            <a href="{{ url_for('auth.register') }}" class="ssp-link fw-semibold">Register Now</a>
          </p>
        </div>

      </div>
    </div>
  </div>
</section>
{% endblock %}
