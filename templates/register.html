{% extends "base.html" %}
{% block title %}Register – Smart Study Planner{% endblock %}

{% block public_content %}
<section class="d-flex align-items-center justify-content-center py-5" style="min-height: 80vh;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-sm-10 col-md-8 col-lg-5 animate-fade-up">

        <div class="glass-card p-4 p-md-5">
          <!-- Header -->
          <div class="text-center mb-5">
            <div class="stat-icon-box mx-auto mb-4" style="background: var(--accent-soft); color: var(--accent); width: 80px; height: 80px; font-size: 2.5rem;">
              <i class="bi bi-person-plus"></i>
            </div>
            <h2 class="fw-bold h3">Join the High Achievers</h2>
            <p class="text-dim small">Start your professional study plan today</p>
          </div>

          <!-- Form -->
          <form action="{{ url_for('auth.register') }}" method="POST" id="registerForm" class="form-premium" novalidate>

            <div class="mb-4">
              <label for="reg_username" class="form-label">
                <i class="bi bi-person me-2 text-accent"></i>Username
              </label>
              <input type="text" id="reg_username" name="username"
                     class="input-premium form-control" placeholder="john_doe"
                     required minlength="3" autocomplete="username" />
            </div>

            <div class="mb-4">
              <label for="reg_email" class="form-label">
                <i class="bi bi-envelope me-2 text-accent"></i>Email Address
              </label>
              <input type="email" id="reg_email" name="email"
                     class="input-premium form-control" placeholder="john@example.com"
                     required autocomplete="email" />
            </div>

            <div class="mb-4">
              <label for="reg_password" class="form-label">
                <i class="bi bi-lock me-2 text-accent"></i>Password
              </label>
              <input type="password" id="reg_password" name="password"
                     class="input-premium form-control" placeholder="Min. 6 characters"
                     required minlength="6" autocomplete="new-password" />
            </div>

            <div class="mb-5">
              <label for="reg_confirm" class="form-label">
                <i class="bi bi-shield-check me-2 text-accent"></i>Confirm Password
              </label>
              <input type="password" id="reg_confirm" name="confirm"
                     class="input-premium form-control" placeholder="••••••••"
                     required autocomplete="new-password" />
            </div>

            <button type="submit" id="registerBtn" class="btn btn-premium w-100 py-3 fw-bold">
              Create Account <i class="bi bi-rocket-takeoff ms-2"></i>
            </button>
          </form>

          <div class="text-center mt-5 pt-4 border-top border-glass">
            <p class="text-dim small mb-0">
              Already have an account?
              <a href="{{ url_for('auth.login') }}" class="text-accent fw-bold text-decoration-none ms-1">Sign In</a>
            </p>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>
{% endblock %}
